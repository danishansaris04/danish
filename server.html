<!DOCTYPE html>
<html>
<head>
    <title>D-Flix Background System</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body style="background: black; color: #111; font-family: monospace;">
    <div id="log">System Running in Background...</div>

    <script>
        const fdbConfig = {
            apiKey: "AIzaSyDUgUTVv07lz6AmFUe-oPvSRN7AxrZOcY0",
            databaseURL: "https://ccmcserver-4d9b7-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(fdbConfig);
        const fdb = firebase.database();

        // Background logic har 30 second mein check karega
        setInterval(() => {
            fdb.ref('server_settings').once('value', snap => {
                const d = snap.val() || {};
                if (!d.startTime || !d.endTime) return;

                const now = new Date();
                const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                let targetSite = (currentTime >= d.startTime && currentTime < d.endTime) ? "1" : "2";

                if (d.active_site !== targetSite) {
                    fdb.ref('server_settings').update({ active_site: targetSite });
                    document.getElementById('log').innerHTML = `Last Update: Switched to Site ${targetSite} at ${currentTime}`;
                }
            });
        }, 30000); 
    </script>
</body>
</html>
